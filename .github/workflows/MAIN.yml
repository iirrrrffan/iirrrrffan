name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ Updated checkout version (important)
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Snake generator
      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: iirrrrffan
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg

      # ✅ Push to output branch
      - name: Push snake
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
